<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFCA - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box auth-card">
            <h2 style="color:var(--primary)">REGISTRASI MEMBER</h2>
            <form id="form-registrasi">
                <input type="text" name="reg_nama" placeholder="Nama Lengkap" required>
                <input type="tel" name="reg_wa" placeholder="Nomor WhatsApp" required>
                <input type="text" name="reg_uid" placeholder="UID Free Fire" required>
                <input type="text" name="reg_user" placeholder="Username" required>
                <input type="password" name="reg_pass" placeholder="Password" required>
                <button type="submit">Daftar Sekarang</button>
            </form>
            <p><a href="index.html" style="color:#aaa">Kembali ke Login</a></p>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
