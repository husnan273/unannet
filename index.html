<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Event FFCA</title>
    <style>
        body { font-family: sans-serif; background-color: #000; color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .form-container { background: #1a1a1a; border: 2px solid #ffcc00; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; }
        h2 { color: #ffcc00; text-align: center; text-transform: uppercase; }
        label { display: block; margin-top: 15px; color: #ccc; }
        input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; }
        .btn-submit { width: 100%; background: #ffcc00; color: #000; border: none; padding: 15px; margin-top: 25px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-submit:hover { background: #fff; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Daftar Event FFCA</h2>
        <form id="ffca-form">
            <label>Nama Tim</label>
            <input type="text" name="nama_tim" required placeholder="Masukkan Nama Tim">
            
            <label>Nomor Telepon (WhatsApp)</label>
            <input type="tel" name="no_telp" required placeholder="Contoh: 08123456789">
            
            <label>UID (Free Fire)</label>
            <input type="text" name="uid" required placeholder="Masukkan UID Pemain">
            
            <label>Nickname</label>
            <input type="text" name="nickname" required placeholder="Masukkan Nickname">
            
            <button type="submit" class="btn-submit" id="submit-button">Submit Pendaftaran</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxppKiLsiJ0OPm4WmEQOi4DgPH_MXLPsIEhm7NeLAD1UCCI479fIkAGeHbjBv6MNJHkQA/exec'; // GANTI INI
        const form = document.getElementById('ffca-form');
        const status = document.getElementById('status');
        const btn = document.getElementById('submit-button');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            status.innerHTML = "Sedang mengirim data...";
            status.style.color = "#ffcc00";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    status.innerHTML = "Pendaftaran Berhasil Terkirim!";
                    status.style.color = "#00ff00";
                    form.reset();
                    btn.disabled = false;
                })
                .catch(error => {
                    status.innerHTML = "Gagal mengirim. Coba lagi!";
                    status.style.color = "#ff0000";
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
