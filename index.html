<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFCA - Professional Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card: #1a1a1a; --border: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; }
        .hidden { display: none !important; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 20px; border-bottom: 2px solid var(--primary); position: sticky; top:0; z-index:1000; }
        nav a { color: #fff; text-decoration: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .box { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        
        /* Dashboard Layout 60/40 */
        .dashboard-grid { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
        .leader-left { flex: 0 0 60%; min-width: 350px; }
        .leader-right { flex: 1; min-width: 300px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; background: var(--card); border-radius: 10px; overflow: hidden; }
        th { background: #222; color: #888; padding: 12px; text-align: left; border-bottom: 2px solid var(--primary); }
        td { padding: 10px 12px; border-bottom: 1px solid #222; }
        .rank { font-weight: bold; color: var(--primary); width: 30px; }
        .row-logo { width: 25px; height: 25px; border-radius: 50%; vertical-align: middle; margin-right: 8px; border: 1px solid var(--primary); }
        
        /* Komunitas Grid */
        .km-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .km-card { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .km-logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }

        /* Auth & Forms */
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid var(--border); background: #222; color: #fff; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; margin-top: 10px; }

        /* Chat */
        #chat-box { height: 350px; overflow-y: auto; background: #111; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 0.9rem; }
        .sent { background: var(--primary); color: #000; align-self: flex-end; }
        .received { background: #333; align-self: flex-start; }
    </style>
</head>
<body>

    <div id="section-auth" class="container">
        <div id="login-box" class="box" style="max-width: 400px; margin: 100px auto; text-align: center;">
            <h2 style="color:var(--primary)">FFCA LOGIN</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="window.handleLogin()">Sign In</button>
            <p>Belum punya akun? <a onclick="toggleAuth()" style="color:var(--primary); cursor:pointer">Daftar</a></p>
        </div>
        <div id="reg-box" class="box hidden" style="max-width: 400px; margin: 50px auto; text-align: center;">
            <h2 style="color:var(--primary)">DAFTAR</h2>
            <form id="form-register">
                <input type="text" name="reg_nama" placeholder="Nama Lengkap" required>
                <input type="text" name="reg_user" placeholder="Username" required>
                <input type="password" name="reg_pass" placeholder="Password" required>
                <button type="submit">Daftar</button>
            </form>
            <p><a onclick="toggleAuth()" style="color:#aaa; cursor:pointer">Kembali</a></p>
        </div>
    </div>

    <div id="section-app" class="hidden">
        <nav>
            <a onclick="window.showPage('page-dashboard')">Dashboard</a>
            <a onclick="window.showPage('page-event')">Event</a>
            <a onclick="window.showPage('page-chat')">Chat</a>
            <a onclick="window.handleLogout()" style="color:red">Logout</a>
        </nav>

        <div class="container">
            <div id="page-dashboard">
                <h2 id="welcome-txt" style="color:var(--primary); margin-bottom: 20px;"></h2>
                
                <div class="dashboard-grid">
                    <div class="leader-left">
                        <div class="box" style="padding:0">
                            <div style="padding:15px; border-bottom:1px solid #333"><h3 style="margin:0; color:var(--primary)">TOP 20 OVERALL LEADERBOARD</h3></div>
                            <table>
                                <thead><tr><th>Rank</th><th>Kota</th><th>Event</th><th>Point</th><th>Slot</th><th>Avg</th></tr></thead>
                                <tbody id="body-overall"></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="leader-right">
                        <div class="box" style="padding:0">
                            <div style="padding:15px; border-bottom:1px solid #333"><h3 style="margin:0; color:var(--primary)">LEADERBOARD MARET</h3></div>
                            <table>
                                <thead><tr><th>Rank</th><th>Kota</th><th>Point</th></tr></thead>
                                <tbody id="body-maret"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <h3>DATA KOMUNITAS</h3>
                <div class="box" style="display:flex; gap:10px;">
                    <input type="text" id="search-km" placeholder="Cari Kota..." onkeyup="window.filterKM()">
                    <select id="prov-km" onchange="window.filterKM()"><option value="All">Semua Provinsi</option></select>
                </div>
                <div id="list-km" class="km-grid"></div>
            </div>

            <div id="page-event" class="hidden">
                <div class="box">
                    <h2>DAFTAR EVENT</h2>
                    <form id="form-event">
                        <input type="text" name="nama_tim" placeholder="Nama Tim">
                        <input type="text" id="nick-field" name="nickname" readonly style="background:#333">
                        <button type="submit">Kirim</button>
                    </form>
                </div>
            </div>

            <div id="page-chat" class="hidden">
                <div class="box">
                    <h3>CHAT</h3>
                    <div id="chat-box"></div>
                    <div style="display:flex; margin-top:10px; gap:10px;">
                        <input type="text" id="chat-input" placeholder="Ketik pesan...">
                        <button onclick="window.sendChat()" style="width:100px; margin:0">Kirim</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDT9hPRbKJ3BRsnQ3R6su0YVA1C_YhaAN4",
  authDomain: "ffca-chat.firebaseapp.com",
  databaseURL: "https://ffca-chat-default-rtdb.firebaseio.com",
  projectId: "ffca-chat",
  storageBucket: "ffca-chat.firebasestorage.app",
  messagingSenderId: "893006406369",
  appId: "1:893006406369:web:d4c5e38f7d3ce9cde68da0",
  measurementId: "G-4GXJLEDT7E"
};
        const sheetURL = 'https://script.google.com/macros/s/AKfycbwpsSAqo6cpIVzluP1mUOFlzygtONPRvE-j67wr2GUCNvAMjsnUQQ7zijKtdvs4J4eDQg/exec';

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "chats");
        let allKM = [];

        function getImg(url) {
            if (!url) return 'https://via.placeholder.com/60?text=FFCA';
            let id = url.includes('/d/') ? url.split('/d/')[1].split('/')[0] : url.split('id=')[1];
            return `http://googleusercontent.com/profile/picture/5${id}`;
        }

        window.toggleAuth = () => {
            document.getElementById('login-box').classList.toggle('hidden');
            document.getElementById('reg-box').classList.toggle('hidden');
        }

        window.handleLogin = () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            fetch(`${sheetURL}?action=login&username=${u}&password=${p}`, { method: 'POST' })
            .then(res => res.json()).then(data => {
                if(data.result === "success") {
                    localStorage.setItem('ffca_user', data.nickname);
                    enterApp(data.nickname);
                } else alert("Gagal!");
            });
        }

        function enterApp(nick) {
            document.getElementById('section-auth').classList.add('hidden');
            document.getElementById('section-app').classList.remove('hidden');
            document.getElementById('welcome-txt').innerText = `Halo, ${nick}!`;
            document.getElementById('nick-field').value = nick;
            loadDashboard(); loadKM();
        }

        function loadDashboard() {
            fetch(`${sheetURL}?action=getDashboard`).then(res => res.json()).then(data => {
                document.getElementById('body-overall').innerHTML = data.overall.map((r, i) => `
                    <tr><td class="rank">${i+1}</td><td><img src="${getImg(r[6])}" class="row-logo">${r[0]}</td><td>${r[1]}</td><td style="color:var(--primary); font-weight:bold">${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td></tr>
                `).join('');
                document.getElementById('body-maret').innerHTML = data.maret.map((r, i) => `
                    <tr><td class="rank">${i+1}</td><td>${r[0]}</td><td style="color:var(--primary); font-weight:bold">${r[2]}</td></tr>
                `).join('');
            });
        }

        function loadKM() {
            fetch(`${sheetURL}?action=getKomunitas`).then(res => res.json()).then(data => {
                allKM = data; renderKM(data);
                const sel = document.getElementById('prov-km');
                [...new Set(data.map(i => i[2]))].sort().forEach(p => {
                    const o = document.createElement('option'); o.value = p; o.innerText = p; sel.appendChild(o);
                });
            });
        }

        function renderKM(data) {
            document.getElementById('list-km').innerHTML = data.map(i => `
                <div class="km-card">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px">
                        <img src="${getImg(i[6])}" class="km-logo"><h3>${i[0]}</h3>
                    </div>
                    <p style="font-size:0.8rem">PIC: ${i[3]} | ${i[2]}</p>
                    <a href="${i[4]}" target="_blank" style="display:block; text-align:center; padding:8px; background:var(--primary); color:#000; text-decoration:none; border-radius:5px; font-weight:bold">Instagram</a>
                </div>
            `).join('');
        }

        window.filterKM = () => {
            const s = document.getElementById('search-km').value.toLowerCase();
            const p = document.getElementById('prov-km').value;
            renderKM(allKM.filter(i => (i[0].toLowerCase().includes(s)) && (p === "All" || i[2] === p)));
        }

        window.showPage = (id) => {
            ['page-dashboard', 'page-event', 'page-chat'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        window.sendChat = () => {
            const i = document.getElementById('chat-input');
            const n = localStorage.getItem('ffca_user');
            if(i.value.trim()){ push(chatRef, { sender: n, text: i.value }); i.value = ""; }
        }

        onChildAdded(chatRef, (d) => {
            const m = d.val(); const box = document.getElementById('chat-box');
            if(!box) return;
            const div = document.createElement('div');
            div.className = `msg ${m.sender === localStorage.getItem('ffca_user') ? 'sent' : 'received'}`;
            div.innerHTML = `<small><b>${m.sender}</b></small><br>${m.text}`;
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        });

        window.handleLogout = () => { localStorage.clear(); location.reload(); }
        window.onload = () => { if(localStorage.getItem('ffca_user')) enterApp(localStorage.getItem('ffca_user')); }
    </script>
</body>
</html>
