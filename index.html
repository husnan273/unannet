<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFCA Portal - Community & Logo Final</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; }
        .hidden { display: none !important; }
        .container { padding: 20px; max-width: 1100px; margin: auto; }
        nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 20px; border-bottom: 2px solid var(--primary); position: sticky; top:0; z-index:1000; }
        nav a { color: #fff; text-decoration: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .box { background: var(--card); padding: 25px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; margin-top: 10px; }
        
        /* Komunitas Cards */
        .komunitas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .km-card { background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #333; transition: 0.3s; }
        .km-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .km-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .km-logo { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); background: #222; }

        /* Chat */
        #chat-box { height: 350px; overflow-y: auto; background: #111; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 0.9rem; }
        .sent { background: var(--primary); color: #000; align-self: flex-end; }
        .received { background: #333; align-self: flex-start; }
    </style>
</head>
<body>

    <div id="section-auth" class="container">
        <div id="login-box" class="box" style="max-width: 400px; margin: 80px auto; text-align:center;">
            <h2 style="color:var(--primary)">FFCA LOGIN</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="window.handleLogin()">Sign In</button>
            <p>Belum punya akun? <a onclick="window.toggleAuth()" style="color:var(--primary); cursor:pointer">Daftar</a></p>
        </div>
        <div id="reg-box" class="box hidden" style="max-width: 400px; margin: 50px auto; text-align:center;">
            <h2 style="color:var(--primary)">DAFTAR MEMBER</h2>
            <form id="form-register">
                <input type="text" name="reg_nama" placeholder="Nama Lengkap" required>
                <input type="tel" name="reg_wa" placeholder="WhatsApp" required>
                <input type="text" name="reg_uid" placeholder="UID FF" required>
                <input type="text" name="reg_user" placeholder="Username" required>
                <input type="password" name="reg_pass" placeholder="Password" required>
                <button type="submit">Daftar Sekarang</button>
            </form>
            <p><a onclick="window.toggleAuth()" style="color:#aaa; cursor:pointer">Kembali ke Login</a></p>
        </div>
    </div>

    <div id="section-app" class="hidden">
        <nav>
            <a onclick="window.showPage('page-dashboard')">Dashboard</a>
            <a onclick="window.showPage('page-event')">Pendaftaran</a>
            <a onclick="window.showPage('page-chat')">Chat</a>
            <a onclick="window.handleLogout()" style="color:red">Logout</a>
        </nav>

        <div class="container">
            <div id="page-dashboard">
                <h2 id="welcome-txt" style="color:var(--primary)"></h2>
                <div class="box">
                    <h3>LEADERBOARD OVERALL</h3>
                    <div style="height:300px"><canvas id="leaderChart"></canvas></div>
                </div>

                <h3>DATA KOMUNITAS</h3>
                <div class="box" style="display:flex; gap:10px;">
                    <input type="text" id="search-km" placeholder="Cari Nama Kota atau PIC..." onkeyup="window.filterKM()">
                    <select id="prov-km" onchange="window.filterKM()"><option value="All">Semua Provinsi</option></select>
                </div>
                <div id="list-km" class="komunitas-grid"></div>
            </div>

            <div id="page-event" class="hidden">
                <div class="box">
                    <h2 style="color:var(--primary)">FORM PENDAFTARAN</h2>
                    <form id="form-event">
                        <input type="text" name="nama_tim" placeholder="Nama Tim" required>
                        <input type="text" name="uid" placeholder="UID FF" required>
                        <input type="tel" name="no_telp" placeholder="WhatsApp" required>
                        <input type="text" id="nick-field" name="nickname" readonly style="background:#333">
                        <button type="submit">Submit Data</button>
                    </form>
                </div>
            </div>

            <div id="page-chat" class="hidden">
                <div class="box">
                    <h3>GENERAL CHAT</h3>
                    <div id="chat-box"></div>
                    <div style="display:flex; margin-top:10px; gap:10px;">
                        <input type="text" id="chat-input" placeholder="Tulis pesan...">
                        <button onclick="window.sendChat()" style="width:100px; margin:0">Kirim</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
