<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFCA - Role System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card: #1a1a1a; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; }
        .hidden { display: none; }
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 15px; border-bottom: 2px solid var(--primary); sticky; top:0; }
        nav a { color: #fff; text-decoration: none; font-weight: bold; cursor: pointer; }
        .box { background: var(--card); padding: 25px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        #chat-box { height: 300px; overflow-y: auto; background: #111; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px; border-radius: 8px; max-width: 80%; }
        .sent { background: var(--primary); color: #000; align-self: flex-end; }
        .received { background: #333; align-self: flex-start; }
        .no-access { text-align: center; color: #ff4444; padding: 50px; font-weight: bold; border: 2px dashed #ff4444; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="section-auth" class="container">
        <div id="login-form" class="box" style="max-width: 400px; margin: 50px auto;">
            <h2 style="color:var(--primary); text-align:center">FFCA LOGIN</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="window.handleLogin()">Login</button>
            <p style="text-align:center">Belum punya akun? <a onclick="toggleAuth()" style="color:var(--primary); cursor:pointer">Daftar</a></p>
        </div>

        <div id="reg-form-box" class="box hidden" style="max-width: 400px; margin: 50px auto;">
            <h2 style="color:var(--primary); text-align:center">REGISTRASI MEMBER</h2>
            <form id="main-reg-form">
                <input type="text" name="reg_nama" placeholder="Nama Lengkap" required>
                <input type="tel" name="reg_wa" placeholder="No WhatsApp" required>
                <input type="text" name="reg_uid" placeholder="UID Free Fire" required>
                <input type="text" name="reg_user" placeholder="Buat Username" required>
                <input type="password" name="reg_pass" placeholder="Buat Password" required>
                <button type="submit" id="btn-reg">Daftar Sekarang</button>
            </form>
            <p style="text-align:center"><a onclick="toggleAuth()" style="color:#aaa; cursor:pointer">Kembali ke Login</a></p>
        </div>
    </div>

    <div id="section-app" class="hidden">
        <nav>
            <a onclick="window.showPage('page-dashboard')">Dashboard</a>
            <a onclick="window.showPage('page-daftar')">Event</a>
            <a onclick="window.showPage('page-chat')">Chat</a>
            <a onclick="window.handleLogout()" style="color:red">Logout</a>
        </nav>

        <div class="container">
            <div id="page-dashboard">
                <h2 id="welcome-msg"></h2>
                <div class="box"><h3>LEADERBOARD</h3><canvas id="myChart"></canvas></div>
            </div>

            <div id="page-daftar" class="hidden">
                <div class="box"><h2>PENDAFTARAN EVENT</h2><p>Form pendaftaran muncul di sini...</p></div>
            </div>

            <div id="page-chat" class="hidden">
                <div id="chat-restricted" class="hidden no-access">
                    🔒 MAAF, FITUR CHAT HANYA UNTUK ROLE FFCA & CB
                </div>
                <div id="chat-allowed" class="box hidden">
                    <h2>COMMUNITY CHAT</h2>
                    <div id="chat-box"></div>
                    <div style="display:flex; margin-top:10px; gap:10px;">
                        <input type="text" id="chat-input" placeholder="Tulis pesan...">
                        <button onclick="window.sendChat()" style="width:80px; margin:0">Kirim</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
  apiKey: "AIzaSyDT9hPRbKJ3BRsnQ3R6su0YVA1C_YhaAN4",
  authDomain: "ffca-chat.firebaseapp.com",
  databaseURL: "https://ffca-chat-default-rtdb.firebaseio.com",
  projectId: "ffca-chat",
  storageBucket: "ffca-chat.firebasestorage.app",
  messagingSenderId: "893006406369",
  appId: "1:893006406369:web:d4c5e38f7d3ce9cde68da0",
  measurementId: "G-4GXJLEDT7E"
};
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "chats");

        const sheetURL = 'https://script.google.com/macros/s/AKfycbxHeGviAYwQyAv4AanTpaOvx15sVTyCE6zn9OPGq7KIOHeEenZM25czrr9zNfBu0cm14w/exec';

        // Toggle Login vs Regis
        window.toggleAuth = function() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('reg-form-box').classList.toggle('hidden');
        }

        // Login Logic
        window.handleLogin = function() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            fetch(`${sheetURL}?action=login&username=${u}&password=${p}`, { method: 'POST' })
            .then(res => res.json()).then(data => {
                if(data.result === "success") {
                    localStorage.setItem('ffca_session', JSON.stringify(data));
                    enterApp(data);
                } else { alert("User/Pass Salah!"); }
            });
        }

        function enterApp(user) {
            document.getElementById('section-auth').classList.add('hidden');
            document.getElementById('section-app').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `Halo, ${user.nickname} (${user.role})`;
            
            // CEK ROLE UNTUK CHAT
            if(user.role === "FFCA" || user.role === "CB") {
                document.getElementById('chat-allowed').classList.remove('hidden');
            } else {
                document.getElementById('chat-restricted').classList.remove('hidden');
            }
        }

        // Registrasi Logic
        document.getElementById('main-reg-form').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('btn-reg').innerText = "Mendaftarkan...";
            let fd = new FormData(this);
            fd.append('action', 'register');
            fetch(sheetURL, { method: 'POST', body: fd })
            .then(res => res.text()).then(txt => {
                alert(txt);
                if(txt.includes("Berhasil")) location.reload();
                document.getElementById('btn-reg').innerText = "Daftar Sekarang";
            });
        });

        window.showPage = (id) => {
            ['page-dashboard', 'page-daftar', 'page-chat'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        window.handleLogout = () => { localStorage.clear(); location.reload(); }

        window.onload = () => {
            const session = localStorage.getItem('ffca_session');
            if(session) enterApp(JSON.parse(session));
        }
    </script>
</body>
</html>
