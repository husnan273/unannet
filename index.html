<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFCA Portal - Community & Logo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; }
        .hidden { display: none !important; }
        .container { padding: 20px; max-width: 1100px; margin: auto; }
        nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 20px; border-bottom: 2px solid var(--primary); position: sticky; top:0; z-index:1000; }
        nav a { color: #fff; text-decoration: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .box { background: var(--card); padding: 25px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; margin-top: 10px; }
        
        /* Dashboard & Community Styles */
        .komunitas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .km-card { background: #222; padding: 20px; border-radius: 10px; border: 1px solid #333; transition: 0.3s; }
        .km-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .km-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .km-logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); background: #333; }

        /* Chat Styles */
        #chat-box { height: 350px; overflow-y: auto; background: #111; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 0.9rem; }
        .sent { background: var(--primary); color: #000; align-self: flex-end; }
        .received { background: #333; align-self: flex-start; }
    </style>
</head>
<body>

    <div id="section-auth" class="container">
        <div id="login-box" class="box" style="max-width: 400px; margin: 80px auto; text-align:center;">
            <h2 style="color:var(--primary)">FFCA LOGIN</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="window.handleLogin()">Sign In</button>
            <p>Belum punya akun? <a onclick="window.toggleAuth()" style="color:var(--primary); cursor:pointer">Daftar</a></p>
        </div>
        <div id="reg-box" class="box hidden" style="max-width: 400px; margin: 50px auto; text-align:center;">
            <h2 style="color:var(--primary)">DAFTAR MEMBER</h2>
            <form id="form-register">
                <input type="text" name="reg_nama" placeholder="Nama Lengkap" required>
                <input type="tel" name="reg_wa" placeholder="WhatsApp" required>
                <input type="text" name="reg_uid" placeholder="UID FF" required>
                <input type="text" name="reg_user" placeholder="Username" required>
                <input type="password" name="reg_pass" placeholder="Password" required>
                <button type="submit">Daftar Sekarang</button>
            </form>
            <p><a onclick="window.toggleAuth()" style="color:#aaa; cursor:pointer">Kembali</a></p>
        </div>
    </div>

    <div id="section-app" class="hidden">
        <nav>
            <a onclick="window.showPage('page-dashboard')">Dashboard</a>
            <a onclick="window.showPage('page-event')">Pendaftaran</a>
            <a onclick="window.showPage('page-chat')">Chat</a>
            <a onclick="window.handleLogout()" style="color:red">Logout</a>
        </nav>

        <div class="container">
            <div id="page-dashboard">
                <h2 id="welcome-txt" style="color:var(--primary)"></h2>
                <div class="box">
                    <h3>LEADERBOARD OVERALL</h3>
                    <div style="height:300px"><canvas id="leaderChart"></canvas></div>
                </div>

                <h3>DATA KOMUNITAS</h3>
                <div class="box" style="display:flex; gap:10px;">
                    <input type="text" id="search-km" placeholder="Cari Nama Kota atau PIC..." onkeyup="window.filterKM()">
                    <select id="prov-km" onchange="window.filterKM()"><option value="All">Semua Provinsi</option></select>
                </div>
                <div id="list-km" class="komunitas-grid"></div>
            </div>

            <div id="page-event" class="hidden">
                <div class="box">
                    <h2 style="color:var(--primary)">FORM PENDAFTARAN</h2>
                    <form id="form-event">
                        <input type="text" name="nama_tim" placeholder="Nama Tim" required>
                        <input type="text" name="uid" placeholder="UID FF" required>
                        <input type="tel" name="no_telp" placeholder="WhatsApp" required>
                        <input type="text" id="nick-field" name="nickname" readonly style="background:#333">
                        <button type="submit">Submit Data</button>
                    </form>
                </div>
            </div>

            <div id="page-chat" class="hidden">
                <div class="box">
                    <h3>GENERAL CHAT</h3>
                    <div id="chat-box"></div>
                    <div style="display:flex; margin-top:10px; gap:10px;">
                        <input type="text" id="chat-input" placeholder="Tulis pesan...">
                        <button onclick="window.sendChat()" style="width:100px; margin:0">Kirim</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // --- KONFIGURASI ---
        const firebaseConfig = {
            apiKey: "AIzaSyDT9hPRbKJ3BRsnQ3R6su0YVA1C_YhaAN4",
            authDomain: "ffca-chat.firebaseapp.com",
            databaseURL: "https://ffca-chat-default-rtdb.firebaseio.com",
            projectId: "ffca-chat",
            storageBucket: "ffca-chat.firebasestorage.app",
            messagingSenderId: "893006406369",
            appId: "1:893006406369:web:d4c5e38f7d3ce9cde68da0"
        };
        const sheetURL = 'https://script.google.com/macros/s/AKfycbwFLmXzr7D-yu8k0J6d6OA0da5aKFay9AORy1aCBtc3M2be3euWiaopqJ24Ysz93XT3yQ/exec';

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "chats");
        let allKM = [];

        // Fungsi ubah link Drive ke Direct Link
        function getImg(url) {
            if (!url) return 'https://via.placeholder.com/60?text=FFCA';
            if (url.includes('drive.google.com')) {
                var id = url.split('/d/')[1] ? url.split('/d/')[1].split('/')[0] : url.split('id=')[1];
                return 'https://lh3.googleusercontent.com/d/' + id;
            }
            return url;
        }

        window.toggleAuth = () => {
            document.getElementById('login-box').classList.toggle('hidden');
            document.getElementById('reg-box').classList.toggle('hidden');
        }

        window.handleLogin = () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            fetch(`${sheetURL}?action=login&username=${u}&password=${p}`, { method: 'POST' })
            .then(res => res.json()).then(data => {
                if(data.result === "success") {
                    localStorage.setItem('ffca_logged', 'true');
                    localStorage.setItem('ffca_nick', data.nickname);
                    enterApp(data.nickname);
                } else { alert("Gagal Login!"); }
            });
        }

        function enterApp(nick) {
            document.getElementById('section-auth').classList.add('hidden');
            document.getElementById('section-app').classList.remove('hidden');
            document.getElementById('welcome-txt').innerText = `Halo, ${nick}!`;
            document.getElementById('nick-field').value = nick;
            initChart(); loadKM();
        }

        window.showPage = (id) => {
            ['page-dashboard', 'page-event', 'page-chat'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        window.handleLogout = () => { localStorage.clear(); location.reload(); }

        function loadKM() {
            fetch(`${sheetURL}?action=getKomunitas`).then(res => res.json()).then(data => {
                allKM = data; renderKM(data);
                const sel = document.getElementById('prov-km');
                [...new Set(data.map(i => i[2]))].sort().forEach(p => {
                    const o = document.createElement('option'); o.value = p; o.innerText = p; sel.appendChild(o);
                });
            });
        }

        function renderKM(data) {
            const list = document.getElementById('list-km');
            list.innerHTML = data.map(i => `
                <div class="km-card">
                    <div class="km-header">
                        <img src="${getImg(i[6])}" class="km-logo" onerror="this.src='https://via.placeholder.com/60?text=FFCA'">
                        <h3 style="margin:0; color:var(--primary)">${i[0]}</h3>
                    </div>
                    <p style="font-size:0.9rem; margin:5px 0"><b>PIC:</b> ${i[3]}</p>
                    <p style="font-size:0.9rem; margin:5px 0"><b>Provinsi:</b> ${i[2]}</p>
                    <p style="font-size:0.9rem; margin:5px 0"><b>Berdiri:</b> ${i[5]}</p>
                    <a href="${i[4]}" target="_blank" style="display:block; margin-top:15px; background:var(--primary); color:#000; text-align:center; padding:8px; border-radius:5px; text-decoration:none; font-weight:bold; font-size:0.8rem">Buka Instagram</a>
                </div>
            `).join('');
        }

        window.filterKM = () => {
            const s = document.getElementById('search-km').value.toLowerCase();
            const p = document.getElementById('prov-km').value;
            renderKM(allKM.filter(i => (i[0].toLowerCase().includes(s) || i[3].toLowerCase().includes(s)) && (p === "All" || i[2] === p)));
        }

        window.sendChat = () => {
            const i = document.getElementById('chat-input');
            const n = document.getElementById('nick-field').value;
            if(i.value.trim()){ push(chatRef, { sender: n, text: i.value }); i.value = ""; }
        }

        onChildAdded(chatRef, (d) => {
            const m = d.val(); const box = document.getElementById('chat-box'); if(!box) return;
            const div = document.createElement('div');
            div.className = `msg ${m.sender === document.getElementById('nick-field').value ? 'sent' : 'received'}`;
            div.innerHTML = `<small><b>${m.sender}</b></small><br>${m.text}`;
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        });

        document.getElementById('form-register').addEventListener('submit', function(e){
            e.preventDefault();
            let fd = new FormData(this); fd.append('action', 'register');
            fetch(sheetURL, { method: 'POST', body: fd }).then(res => res.text()).then(t => { alert(t); location.reload(); });
        });

        document.getElementById('form-event').addEventListener('submit', function(e){
            e.preventDefault();
            let fd = new FormData(this); fd.append('action', 'submit');
            fetch(sheetURL, { method: 'POST', body: fd }).then(() => alert("Pendaftaran Berhasil!"));
        });

        function initChart() {
            new Chart(document.getElementById('leaderChart'), {
                type: 'bar',
                data: { labels: ['Solo', 'Gorontalo', 'Bandung'], datasets: [{ label: 'Point', data: [151, 146, 146], backgroundColor: '#ffcc00' }] },
                options: { maintainAspectRatio: false, scales: { y: { ticks: { color: '#fff' } } } }
            });
        }

        window.onload = () => {
            const logged = localStorage.getItem('ffca_logged');
            if(logged === 'true') enterApp(localStorage.getItem('ffca_nick'));
        }
    </script>
</body>
</html>
