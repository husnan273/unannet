<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFCA - Professional Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card: #1a1a1a; --text: #fff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 20px; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        nav a { color: #fff; text-decoration: none; font-weight: bold; text-transform: uppercase; cursor: pointer; padding: 5px 10px; transition: 0.3s; }
        nav a:hover { color: var(--primary); }
        .container { padding: 20px; max-width: 1100px; margin: auto; }
        .hidden { display: none; }
        
        /* Stats & Charts */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border-bottom: 3px solid var(--primary); text-align: center; }
        .chart-box { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 30px; height: 300px; }

        /* Filter & Search */
        .filter-area { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; border: 1px solid #333; }
        .search-input { flex: 1; min-width: 200px; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; }
        select { padding: 12px; border-radius: 8px; background: #222; color: #fff; border: 1px solid #444; cursor: pointer; min-width: 150px; }

        /* Komunitas Cards */
        .komunitas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .komunitas-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; transition: 0.3s; position: relative; }
        .komunitas-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(255,204,0,0.1); }
        .komunitas-card h3 { color: var(--primary); margin: 0 0 10px 0; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .komunitas-info { font-size: 0.9rem; color: #ccc; line-height: 1.8; }
        .komunitas-info b { color: var(--primary); }
        .btn-ig { display: block; margin-top: 15px; color: #000; background: var(--primary); padding: 8px; border-radius: 5px; text-decoration: none; font-weight: bold; text-align: center; font-size: 0.85rem; }

        /* Login */
        .login-box { max-width: 350px; margin: 100px auto; background: var(--card); padding: 30px; border-radius: 15px; border: 2px solid var(--primary); text-align: center; }
        input[type="text"], input[type="password"], input[type="tel"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; margin-top: 10px; }
        #login-status { margin-top: 15px; font-weight: bold; }

        /* Chat */
        #chat-box { height: 300px; overflow-y: auto; background: #111; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #333; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 75%; font-size: 0.9rem; }
        .sent { background: var(--primary); color: #000; align-self: flex-end; }
        .received { background: #333; align-self: flex-start; }
    </style>
</head>
<body>

    <div id="section-login" class="login-box">
        <h2 style="color:var(--primary)">FFCA LOGIN</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="window.handleLogin()">Sign In</button>
        <div id="login-status"></div>
    </div>

    <div id="section-app" class="hidden">
        <nav>
            <a onclick="window.showPage('page-dashboard')">Dashboard</a>
            <a onclick="window.showPage('page-daftar')">Daftar</a>
            <a onclick="window.showPage('page-chat')">Chat</a>
            <a onclick="window.handleLogout()" style="color: #ff4444;">Logout</a>
        </nav>

        <div class="container">
            <div id="page-dashboard">
                <div class="stats-grid">
                    <div class="stat-card"><h3>TOTAL EVENTS</h3><p>204</p></div>
                    <div class="stat-card"><h3>TOP CITY</h3><p>SOLO</p></div>
                    <div class="stat-card"><h3>TOTAL SLOTS</h3><p>1,302</p></div>
                </div>
                <div class="chart-box"><canvas id="leaderboardChart"></canvas></div>

                <h2 style="color:var(--primary); margin-top:40px;">DATA KOMUNITAS</h2>
                <div class="filter-area">
                    <input type="text" id="search-komunitas" class="search-input" placeholder="Cari Nama Kota atau PIC..." onkeyup="window.filterKomunitas()">
                    <select id="filter-provinsi" onchange="window.filterKomunitas()">
                        <option value="All">Semua Provinsi</option>
                    </select>
                </div>
                <div id="komunitas-list" class="komunitas-grid">
                    <p style="text-align:center; width:100%">Memuat data komunitas...</p>
                </div>
            </div>

            <div id="page-daftar" class="hidden">
                <div style="background:var(--card); padding:25px; border-radius:12px;">
                    <h2 style="color:var(--primary)">PENDAFTARAN EVENT</h2>
                    <form id="reg-form">
                        <input type="text" name="nama_tim" placeholder="Nama Tim" required>
                        <input type="tel" name="no_telp" placeholder="WhatsApp (08xx)" required>
                        <input type="text" name="uid" placeholder="UID Free Fire" required>
                        <input type="text" id="nick-field" name="nickname" readonly style="opacity:0.5">
                        <button type="submit" id="btn-submit">Submit Pendaftaran</button>
                    </form>
                </div>
            </div>

            <div id="page-chat" class="hidden">
                <div style="background:var(--card); padding:20px; border-radius:12px;">
                    <h2 style="color:var(--primary)">GENERAL CHAT</h2>
                    <div id="chat-box"></div>
                    <div style="display:flex; margin-top:10px; gap:10px;">
                        <input type="text" id="chat-input" placeholder="Tulis pesan...">
                        <button onclick="window.sendChat()" style="width:100px; margin:0">Kirim</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // --- MASUKKAN FIREBASE CONFIG KAMU DI SINI ---
      const firebaseConfig = {
  apiKey: "AIzaSyDT9hPRbKJ3BRsnQ3R6su0YVA1C_YhaAN4",
  authDomain: "ffca-chat.firebaseapp.com",
  projectId: "ffca-chat",
  storageBucket: "ffca-chat.firebasestorage.app",
  messagingSenderId: "893006406369",
  appId: "1:893006406369:web:d4c5e38f7d3ce9cde68da0",
  measurementId: "G-4GXJLEDT7E"
};

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "chats");

        // --- MASUKKAN URL APPS SCRIPT KAMU DI SINI ---
        const sheetURL = 'https://script.google.com/macros/s/AKfycbzmlQ0ypmwIY8-APBeWGevw_mmpENFlLPB9ZCfwByncj_yPH0Jd7deuBnQUCk29aNaPKw/exec';

        let allKomunitas = [];

        // Global functions for buttons
        window.handleLogin = function() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const status = document.getElementById('login-status');
            if(!u || !p) return;
            
            status.innerText = "Checking account...";
            status.style.color = "var(--primary)";

            fetch(`${sheetURL}?action=login&username=${u}&password=${p}`, { method: 'POST' })
            .then(res => res.json()).then(data => {
                if(data.result === "success") {
                    localStorage.setItem('ffca_logged', 'true');
                    localStorage.setItem('ffca_nick', data.nickname);
                    enterApp(data.nickname);
                } else { 
                    status.innerText = "Login Gagal!"; 
                    status.style.color = "red";
                }
            });
        }

        window.showPage = function(id) {
            ['page-dashboard', 'page-daftar', 'page-chat'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        window.handleLogout = function() { localStorage.clear(); location.reload(); }

        window.sendChat = function() {
            const input = document.getElementById('chat-input');
            const nick = document.getElementById('nick-field').value;
            if(input.value.trim()){
                push(chatRef, { sender: nick, text: input.value });
                input.value = "";
            }
        }

        window.filterKomunitas = function() {
            const search = document.getElementById('search-komunitas').value.toLowerCase();
            const prov = document.getElementById('filter-provinsi').value;
            const filtered = allKomunitas.filter(item => {
                const matchSearch = item[0].toString().toLowerCase().includes(search) || item[3].toString().toLowerCase().includes(search);
                const matchProv = prov === "All" || item[2] === prov;
                return matchSearch && matchProv;
            });
            renderKomunitas(filtered);
        }

        // Helper functions
        function enterApp(nickname) {
            document.getElementById('section-login').classList.add('hidden');
            document.getElementById('section-app').classList.remove('hidden');
            document.getElementById('nick-field').value = nickname;
            initCharts();
            loadKomunitas();
        }

        function loadKomunitas() {
            fetch(`${sheetURL}?action=getKomunitas`)
            .then(res => res.json()).then(data => {
                allKomunitas = data;
                renderKomunitas(data);
                populateProvinsi(data);
            });
        }

        function renderKomunitas(data) {
            const list = document.getElementById('komunitas-list');
            list.innerHTML = data.map(item => `
                <div class="komunitas-card">
                    <h3>${item[0]}</h3>
                    <div class="komunitas-info">
                        <p><b>PIC:</b> ${item[3]}</p>
                        <p><b>Provinsi:</b> ${item[2]}</p>
                        <p><b>Berdiri:</b> ${item[5]}</p>
                    </div>
                    <a href="${item[4]}" target="_blank" class="btn-ig">Buka Instagram</a>
                </div>
            `).join('');
        }

        function populateProvinsi(data) {
            const select = document.getElementById('filter-provinsi');
            const provinsi = [...new Set(data.map(item => item[2]))].sort();
            provinsi.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p; opt.innerText = p;
                select.appendChild(opt);
            });
        }

        function initCharts() {
            new Chart(document.getElementById('leaderboardChart'), {
                type: 'bar',
                data: {
                    labels: ['Solo', 'Gorontalo', 'Bandung', 'Jogja', 'Bekasi'],
                    datasets: [{ label: 'Points Overall', data: [151, 146, 146, 141, 131], backgroundColor: '#ffcc00' }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff' } } }, scales: { y: { ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } }
            });
        }

        // Event listeners
        onChildAdded(chatRef, (data) => {
            const m = data.val();
            const msgDiv = document.createElement("div");
            const isMe = m.sender === document.getElementById('nick-field').value;
            msgDiv.className = `msg ${isMe ? 'sent' : 'received'}`;
            msgDiv.innerHTML = `<small style="font-weight:bold; display:block; margin-bottom:3px">${m.sender}</small>${m.text}`;
            document.getElementById("chat-box").appendChild(msgDiv);
            document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
        });

        document.getElementById('reg-form').addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerText = "Sending...";
            let fd = new FormData(e.target);
            fd.append('action', 'submit');
            fetch(sheetURL, { method: 'POST', body: fd }).then(() => {
                alert("Pendaftaran Berhasil!");
                btn.innerText = "Submit Pendaftaran";
                e.target.reset();
                document.getElementById('nick-field').value = localStorage.getItem('ffca_nick');
            });
        });

        window.onload = () => {
            if(localStorage.getItem('ffca_logged') === 'true') enterApp(localStorage.getItem('ffca_nick'));
        }
    </script>
</body>
</html>
