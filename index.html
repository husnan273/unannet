<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFCA - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box auth-card">
            <h2 style="color:var(--primary)">FFCA LOGIN</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="window.handleLogin()">Sign In</button>
            <p id="login-status" style="margin-top:15px"></p>
            <p>Belum punya akun? <a href="register.html" style="color:var(--primary)">Daftar Disini</a></p>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
