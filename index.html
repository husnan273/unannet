<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFCA - Professional Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; }
        
        /* Navigation */
        nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 20px; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        nav a { color: #fff; text-decoration: none; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        nav a:hover { color: var(--primary); }

        .container { padding: 20px; max-width: 1000px; margin: auto; }
        .hidden { display: none; }
        
        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border-bottom: 3px solid var(--primary); text-align: center; }
        .stat-card h3 { margin: 0; font-size: 0.8rem; color: #888; }
        .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: bold; color: var(--primary); }

        .chart-box { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; height: 300px; }
        
        /* Login Box */
        .login-box { max-width: 350px; margin: 100px auto; background: var(--card); padding: 30px; border-radius: 15px; border: 2px solid var(--primary); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }

        /* Chat System */
        #chat-box { height: 300px; overflow-y: auto; background: #111; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 75%; font-size: 0.9rem; }
        .sent { background: var(--primary); color: #000; align-self: flex-end; }
        .received { background: #333; align-self: flex-start; }
        .msg small { font-size: 0.7rem; font-weight: bold; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div id="section-login" class="login-box">
        <h2 style="color:var(--primary)">MEMBER LOGIN</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="handleLogin()" id="btn-login">Sign In</button>
        <p id="login-status" style="margin-top:15px; font-size:0.8rem"></p>
    </div>

    <div id="section-app" class="hidden">
        <nav>
            <a onclick="showPage('page-dashboard')">Dashboard</a>
            <a onclick="showPage('page-daftar')">Daftar</a>
            <a onclick="showPage('page-chat')">Chat</a>
            <a onclick="handleLogout()" style="color: #ff4444;">Logout</a>
        </nav>

        <div class="container">
            <div id="page-dashboard">
                <div class="stats-grid">
                    <div class="stat-card"><h3>TOTAL EVENTS</h3><p>204</p></div>
                    <div class="stat-card"><h3>TOP CITY</h3><p>SOLO</p></div>
                    <div class="stat-card"><h3>TOTAL SLOTS</h3><p>1,302</p></div>
                    <div class="stat-card"><h3>AVG SLOT</h3><p>52</p></div>
                </div>
                <div class="chart-box">
                    <canvas id="leaderboardChart"></canvas>
                </div>
            </div>

            <div id="page-daftar" class="hidden">
                <div style="background:var(--card); padding:25px; border-radius:15px;">
                    <h2 style="color:var(--primary)">PENDAFTARAN EVENT</h2>
                    <form id="reg-form">
                        <input type="text" name="nama_tim" placeholder="Nama Tim" required>
                        <input type="tel" name="no_telp" placeholder="Nomor WhatsApp" required>
                        <input type="text" name="uid" placeholder="UID Free Fire" required>
                        <input type="text" id="nick-field" name="nickname" readonly style="opacity:0.5; background:#333">
                        <button type="submit" id="btn-submit">Kirim Pendaftaran</button>
                    </form>
                </div>
            </div>

            <div id="page-chat" class="hidden">
                <div style="background:var(--card); padding:20px; border-radius:15px;">
                    <h2 style="color:var(--primary)">GENERAL CHAT</h2>
                    <div id="chat-box"></div>
                    <div style="display:flex; margin-top:10px; gap:10px;">
                        <input type="text" id="chat-input" placeholder="Tulis pesan..." style="flex:1">
                        <button onclick="sendChat()" style="width:100px; margin:0">Kirim</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // --- 1. GANTI DENGAN FIREBASE CONFIG KAMU ---
       // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDT9hPRbKJ3BRsnQ3R6su0YVA1C_YhaAN4",
  authDomain: "ffca-chat.firebaseapp.com",
  projectId: "ffca-chat",
  storageBucket: "ffca-chat.firebasestorage.app",
  messagingSenderId: "893006406369",
  appId: "1:893006406369:web:d4c5e38f7d3ce9cde68da0",
  measurementId: "G-4GXJLEDT7E"
};

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "chats");

        // --- 2. GANTI DENGAN WEB APP URL GOOGLE APPS SCRIPT KAMU ---
        const sheetURL = 'https://script.google.com/macros/s/AKfycbzmlQ0ypmwIY8-APBeWGevw_mmpENFlLPB9ZCfwByncj_yPH0Jd7deuBnQUCk29aNaPKw/exec';

        // Navigasi Halaman
        window.showPage = function(pageId) {
            ['page-dashboard', 'page-daftar', 'page-chat'].forEach(p => {
                document.getElementById(p).classList.add('hidden');
            });
            document.getElementById(pageId).classList.remove('hidden');
        }

        // Fungsi Masuk (Menghindari Redundant)
        function enterApp(nickname) {
            document.getElementById('section-login').classList.add('hidden');
            document.getElementById('section-app').classList.remove('hidden');
            document.getElementById('nick-field').value = nickname;
            initCharts();
        }

        // Login Logic
        window.handleLogin = function() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const status = document.getElementById('login-status');
            status.innerText = "Checking account...";

            fetch(`${sheetURL}?action=login&username=${u}&password=${p}`, { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if(data.result === "success") {
                    localStorage.setItem('ffca_logged', 'true');
                    localStorage.setItem('ffca_nick', data.nickname);
                    enterApp(data.nickname);
                } else {
                    status.innerText = "Invalid Username or Password!";
                    status.style.color = "red";
                }
            });
        }

        // Anti-Logout (Check session on load)
        window.onload = function() {
            const logged = localStorage.getItem('ffca_logged');
            const nick = localStorage.getItem('ffca_nick');
            if(logged === 'true' && nick) {
                enterApp(nick);
            }
        }

        // Logout
        window.handleLogout = function() {
            localStorage.clear();
            location.reload();
        }

        // Grafik Analitik
        function initCharts() {
            const ctx = document.getElementById('leaderboardChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Solo', 'Gorontalo', 'Bandung', 'Jogja', 'Bekasi'],
                    datasets: [{
                        label: 'Total Point Overall',
                        data: [151, 146, 146, 141, 131],
                        backgroundColor: '#ffcc00'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: {
                        y: { ticks: { color: '#fff' } },
                        x: { ticks: { color: '#fff' } }
                    }
                }
            });
        }

        // Chat Logic
        window.sendChat = function() {
            const input = document.getElementById('chat-input');
            const nick = document.getElementById('nick-field').value;
            if(input.value.trim()){
                push(chatRef, { sender: nick, text: input.value, time: Date.now() });
                input.value = "";
            }
        }

        onChildAdded(chatRef, (data) => {
            const m = data.val();
            const msgDiv = document.createElement("div");
            const isMe = m.sender === document.getElementById('nick-field').value;
            msgDiv.className = `msg ${isMe ? 'sent' : 'received'}`;
            msgDiv.innerHTML = `<small>${m.sender}</small>${m.text}`;
            document.getElementById("chat-box").appendChild(msgDiv);
            document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
        });

        // Form Submit
        document.getElementById('reg-form').addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('btn-submit').innerText = "Sending...";
            let fd = new FormData(e.target);
            fd.append('action', 'submit');
            fetch(sheetURL, { method: 'POST', body: fd })
            .then(() => {
                alert("Pendaftaran Berhasil!");
                document.getElementById('btn-submit').innerText = "Kirim Pendaftaran";
                e.target.reset();
                document.getElementById('nick-field').value = localStorage.getItem('ffca_nick');
            });
        });

        // Bagian Akhir Form Submit
        fetch(sheetURL, { method: 'POST', body: fd })
        .then(() => {
            alert("Pendaftaran Berhasil!");
            // ... dst
    </script>
</body>
</html>
